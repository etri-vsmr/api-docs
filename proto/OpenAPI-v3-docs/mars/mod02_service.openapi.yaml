components:
  schemas:
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/connect.error_details.Any'
          description: A list of messages that carry the error details. There is no limit on the number of messages.
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    connect.error_details.Any:
      type: object
      properties:
        type:
          type: string
          description: 'A URL that acts as a globally unique identifier for the type of the serialized message. For example: `type.googleapis.com/google.rpc.ErrorInfo`. This is used to determine the schema of the data in the `value` field and is the discriminator for the `debug` field.'
        value:
          type: string
          format: binary
          description: The Protobuf message, serialized as bytes and base64-encoded. The specific message type is identified by the `type` field.
        debug:
          oneOf:
            - type: object
              title: Any
              additionalProperties: true
              description: Detailed error information.
          discriminator:
            propertyName: type
          title: Debug
          description: Deserialized error detail payload. The 'type' field indicates the schema. This field is for easier debugging and should not be relied upon for application logic.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message, with an additional debug field for ConnectRPC error details.
    mars_service.BoolValue:
      type: object
      properties:
        value:
          type: boolean
          title: value
      title: BoolValue
      additionalProperties: false
    mars_service.DoubleValue:
      type: object
      properties:
        value:
          type: number
          title: value
          format: double
      title: DoubleValue
      additionalProperties: false
    mars_service.Empty:
      type: object
      title: Empty
      additionalProperties: false
    mars_service.GetIntIndexRequest:
      type: object
      properties:
        index:
          type: integer
          title: index
          format: int32
      title: GetIntIndexRequest
      additionalProperties: false
      description: Request messages with indices
    mars_service.IntValue:
      type: object
      properties:
        value:
          type: integer
          title: value
          format: int32
      title: IntValue
      additionalProperties: false
    mars_service.SetBoolRequest:
      type: object
      properties:
        value:
          type: boolean
          title: value
      title: SetBoolRequest
      additionalProperties: false
    mars_service.SetDoubleIndexRequest:
      type: object
      properties:
        index:
          type: integer
          title: index
          format: int32
        value:
          type: number
          title: value
          format: double
      title: SetDoubleIndexRequest
      additionalProperties: false
    mars_service.SetDoubleRequest:
      type: object
      properties:
        value:
          type: number
          title: value
          format: double
      title: SetDoubleRequest
      additionalProperties: false
    mars_service.SetIntIndexRequest:
      type: object
      properties:
        index:
          type: integer
          title: index
          format: int32
        value:
          type: integer
          title: value
          format: int32
      title: SetIntIndexRequest
      additionalProperties: false
    mars_service.SetIntRequest:
      type: object
      properties:
        value:
          type: integer
          title: value
          format: int32
      title: SetIntRequest
      additionalProperties: false
      description: Set value requests
security: []
